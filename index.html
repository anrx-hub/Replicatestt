<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة ريبليكا - نسخة P2P</title>
    <link rel="stylesheet" href="style.css">
    <!-- استدعاء مكتبة PeerJS للربط المباشر بين الأجهزة -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="game-container">
        <!-- شاشة الدخول واختيار نوع الغرفة -->
        <div id="login-screen" class="screen">
            <h2>ريبليكا - Replica 🎮</h2>
            <input type="text" id="username-input" placeholder="اكتب اسمك هنا..." maxlength="15">
            
            <div class="room-actions">
                <button id="create-room-btn">إنشاء غرفة جديدة 👑</button>
                <hr style="border-color: #3f414d; margin: 15px 0;">
                <input type="text" id="room-id-input" placeholder="أدخل رمز الغرفة للانضمام...">
                <button id="join-room-btn" style="background-color: #28a745; color: white;">انضمام للغرفة 🚪</button>
            </div>
        </div>

        <!-- شاشة اللعب الرئيسية -->
        <div id="game-screen" class="screen hidden">
            <div class="room-id-display">رمز الغرفة لإرساله لأصدقائك: <strong id="current-room-id" style="color: #ffbc00;">-</strong></div>
            
            <div class="game-header">
                <div class="current-letter">الحرف: <span id="letter-display">-</span></div>
                <div class="category-display">المطلوب: <span id="category-display">-</span></div>
            </div>

            <div class="round-info">
                <p id="turn-instruction">في انتظار بدء اللعبة من منشئ الغرفة...</p>
            </div>

            <!-- ساحة الإجابة -->
            <div id="action-area" class="hidden">
                <input type="text" id="answer-input" placeholder="اكتب الإجابة بسرعة...">
                <button id="submit-btn">إرسال الجواب ✅</button>
            </div>

            <!-- قائمة اللاعبين -->
            <div class="players-section">
                <h3>اللاعبون المتصلون:</h3>
                <ul id="players-list"></ul>
            </div>

            <button id="start-game-btn" class="admin-btn hidden">ابدأ الجولة التالية 🚀</button>
        </div>
    </div>

    <script>
        let peer = null;
        let conn = null; // للمشتركين: الاتصال بالمضيف
        let connections = []; // للمضيف: قائمة بكل اتصالات المشتركين
        let players = []; // قائمة بأسماء اللاعبين وحالتهم
        let myId = "";
        let myUsername = "";
        let isHost = false;

        const categories = ["اسم", "حيوان", "نبات", "جماد", "دولة"];
        const letters = "أبتثجحخدذرزسشصضطظعغفقكلمنهـوي";

        // عناصر الواجهة
        const loginScreen = document.getElementById('login-screen');
        const gameScreen = document.getElementById('game-screen');
        const usernameInput = document.getElementById('username-input');
        const roomIdInput = document.getElementById('room-id-input');
        const currentRoomId = document.getElementById('current-room-id');
        const playersList = document.getElementById('players-list');
        const startBtn = document.getElementById('start-game-btn');
        const letterDisplay = document.getElementById('letter-display');
        const categoryDisplay = document.getElementById('category-display');
        const turnInstruction = document.getElementById('turn-instruction');
        const actionArea = document.getElementById('action-area');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');

        // 1. إنشاء غرفة (تصبح أنت المضيف Host)
        document.getElementById('create-room-btn').addEventListener('click', () => {
            myUsername = usernameInput.value.trim();
            if(!myUsername) return alert('الرجاء كتابة اسمك أولاً!');

            isHost = true;
            // توليد معرف عشوائي قصير للغرفة
            const roomId = 'REP-' + Math.floor(1000 + Math.random() * 9000);
            peer = new Peer(roomId);

            peer.on('open', (id) => {
                myId = id;
                initGameUI(id);
                startBtn.classList.remove('hidden');
                // إضافة المضيف لقائمة اللاعبين
                players.push({ id: myId, username: myUsername, isAlive: true });
                updatePlayersList();
            });

            // استقبال اتصالات الأصدقاء
            peer.on('connection', (connection) => {
                connections.push(connection);
                
                connection.on('data', (data) => {
                    if(data.type === 'join') {
                        players.push({ id: connection.peer, username: data.username, isAlive: true });
                        updatePlayersList();
                        broadcast({ type: 'update_players', players: players });
                    }
                    if(data.type === 'submit_answer') {
                        handleAnswer(connection.peer, data.answer);
                    }
                });
            });
        });

        // 2. الانضمام لغرفة موجودة
        document.getElementById('join-room-btn').addEventListener('click', () => {
            myUsername = usernameInput.value.trim();
            const targetRoomId = roomIdInput.value.trim();
            if(!myUsername || !targetRoomId) return alert('الرجاء إدخال اسمك ورمز الغرفة!');

            isHost = false;
            peer = new Peer(); // معرف عشوائي للمشترك

            peer.on('open', (id) => {
                myId = id;
                conn = peer.connect(targetRoomId);

                conn.on('open', () => {
                    initGameUI(targetRoomId);
                    conn.send({ type: 'join', username: myUsername });
                });

                conn.on('data', (data) => {
                    if(data.type === 'update_players') {
                        players = data.players;
                        updatePlayersList();
                    }
                    if(data.type === 'new_round') {
                        startNewRoundClient(data);
                    }
                });
            });
        });

        // تهيئة الشاشة بعد الدخول
        function initGameUI(roomId) {
            currentRoomId.textContent = roomId;
            loginScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
        }

        // تحديث قائمة اللاعبين على الشاشة
        function updatePlayersList() {
            playersList.innerHTML = '';
            players.forEach(p => {
                const li = document.createElement('li');
                li.textContent = `${p.username} ${p.isAlive ? '🟢' : '💀'}`;
                playersList.appendChild(li);
            });
        }

        // إرسال البيانات لجميع اللاعبين (خاص بالمضيف فقط)
        function broadcast(data) {
            connections.forEach(c => {
                if(c.open) c.send(data);
            });
        }

        // --- منطق اللعبة وجريان الجولات ---
        
        // المضيف يضغط "ابدأ الجولة"
        startBtn.addEventListener('click', () => {
            if(!isHost) return;
            
            const alivePlayers = players.filter(p => p.isAlive);
            if(alivePlayers.length === 0) return alert('لا يوجد لاعبين أحياء!');

            const randomLetter = letters[Math.floor(Math.random() * letters.length)];
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            const activePlayer = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];

            const roundData = {
                type: 'new_round',
                letter: randomLetter,
                category: randomCat,
                activePlayerId: activePlayer.id
            };

            // إرسال الجولة للكل وتحديث شاشة المضيف نفسه
            broadcast(roundData);
            startNewRoundClient(roundData);
        });

        // استقبال وتطبيق الجولة الجديدة عند الجميع
        function startNewRoundClient(data) {
            letterDisplay.textContent = data.letter;
            categoryDisplay.textContent = data.category;
            answerInput.value = '';

            const activePlayer = players.find(p => p.id === data.activePlayerId);

            if(data.activePlayerId === myId) {
                turnInstruction.textContent = "⭐️ دورك أنت! اكتب الإجابة بسرعة!";
                actionArea.classList.remove('hidden');
            } else {
                turnInstruction.textContent = `دور اللاعب: [ ${activePlayer ? activePlayer.username : 'غير معروف'} ]`;
                actionArea.classList.add('hidden');
            }
        }

        // الضغط على زر إرسال الإجابة
        submitBtn.addEventListener('click', () => {
            const answer = answerInput.value.trim();
            if(!answer) return;

            if(isHost) {
                handleAnswer(myId, answer);
            } else {
                conn.send({ type: 'submit_answer', answer: answer });
            }
        });

        // معالجة الإجابة والتحقق منها (عند المضيف)
        function handleAnswer(playerId, answer) {
            const currentLetter = letterDisplay.textContent;
            const player = players.find(p => p.id === playerId);

            if(answer.startsWith(currentLetter)) {
                alert(`إجابة صحيحة من ${player.username}! اضغط لبدء جولة جديدة.`);
                actionArea.classList.add('hidden');
            } else {
                alert(`إجابة خاطئة! الكلمة لم تبدأ بحرف ${currentLetter}`);
            }
        }
    </script>
</body>
</html>
